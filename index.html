<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صندوق التحكم · دردشة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>
<body class="chat-body">
<div id="chat-wrapper">
    <!-- الهيدر البسيط -->
    <header class="chat-header">
        <div class="wrap">
            <a href="#" onclick="goHome()"><img src="https://via.placeholder.com/150x60?text=صندوق" alt="شعار" class="logo"></a>
            <nav class="chat-nav">
                <a href="#" onclick="showSection('dashboard')">لوحة التحكم</a>
                <a href="#" onclick="logout()">خروج</a>
            </nav>
        </div>
    </header>

    <!-- واجهة الدردشة الكلاسيكية -->
    <main class="chat-main">
        <fieldset class="chat-box">
            <!-- إطار العرض الرئيسي للدردشة -->
            <iframe frameborder="0" width="100%" height="305" 
                src="https://placeholder-chat.com/main?box=12345" 
                marginheight="2" marginwidth="2" scrolling="auto" 
                allowtransparency="yes" name="chatmain" id="chatmain"
                style="border:0;padding:0;margin:0 auto;background:#fff">
            </iframe>
            
            <!-- إطار نموذج الإدخال -->
            <iframe frameborder="0" width="100%" height="107" 
                src="https://placeholder-chat.com/form?box=12345" 
                marginheight="2" marginwidth="2" scrolling="no" 
                allowtransparency="yes" name="chatform" id="chatform"
                style="border:0;padding:0;margin:0 auto;background:#fff">
            </iframe>
        </fieldset>

        <!-- شريط التحكم الكلاسيكي -->
        <div class="chat-controls">
            <table class="ctrl-table" cellpadding="0" cellspacing="0">
                <tr>
                    <td class="ctrl-spacer">&nbsp;</td>
                    <td class="ctrl-actions" align="left">
                        <span id="chanBar" class="chan-indicator">🟢 متصل</span>
                        <a href="#" onclick="refreshChat()" id="btnRefresh" class="ctrl-link">🔄 تحديث</a>
                    </td>
                </tr>
                <tr>
                    <td colspan="2" class="ctrl-inputs" valign="top">
                        <input type="hidden" name="key" value="abc123">
                        <input type="text" maxlength="25" name="nme" placeholder="الاسم" 
                            autocomplete="off" size="10" value="" class="ctrl-input" id="chatName">
                        <input type="text" maxlength="50" name="eml" placeholder="البريد (اختياري)" 
                            size="10" value="" class="ctrl-input" id="chatEmail">
                        <br>
                        <input type="text" maxlength="200" name="pst" placeholder="اكتب رسالتك هنا..." 
                            autocomplete="off" size="30" value="" class="ctrl-input ctrl-msg" id="chatMsg">
                        <input type="button" value="إرسال" name="sub" class="ctrl-btn" id="btnSend" onclick="sendClassicChat()">
                    </td>
                </tr>
                <tr>
                    <td align="center" colspan="2" class="ctrl-links">
                        <div align="left" class="links-row">
                            <a href="#" id="btnHelp" onclick="showHelp()">❓ مساعدة</a>
                            <span class="lnk">·</span>
                            <a href="#" id="btnSmilies" onclick="toggleSmilies()">😊 رموز</a>
                            <span class="lnk">·</span>
                            <a href="#" id="btnProfile" onclick="showProfile()" title="ملفك الشخصي">👤 ملفي</a>
                        </div>
                    </td>
                </tr>
            </table>
        </div>

        <!-- لوحة الرموز التعبيرية (مخفية افتراضياً) -->
        <div id="smilies-panel" class="smilies-panel" style="display:none">
            <div class="smilies-grid">
                <span class="smiley" onclick="insertSmiley('🙂')">🙂</span>
                <span class="smiley" onclick="insertSmiley('😂')">😂</span>
                <span class="smiley" onclick="insertSmiley('❤️')">❤️</span>
                <span class="smiley" onclick="insertSmiley('👍')">👍</span>
                <span class="smiley" onclick="insertSmiley('🎉')">🎉</span>
                <span class="smiley" onclick="insertSmiley('🔥')">🔥</span>
                <span class="smiley" onclick="insertSmiley('✨')">✨</span>
                <span class="smiley" onclick="insertSmiley('💬')">💬</span>
            </div>
            <button class="smilies-close" onclick="toggleSmilies()">✕ إغلاق</button>
        </div>
    </main>

    <!-- الفوتر -->
    <footer class="chat-footer">
        <p>© 2024 صندوق التحكم · <a href="#" onclick="alert('شروط الاستخدام')">الشروط</a> · <a href="#" onclick="alert('سياسة الخصوصية')">الخصوصية</a></p>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
